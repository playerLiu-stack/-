<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>婚姻家事权益初判 H5</title>
    <style>
:root {
  color-scheme: light;
  --bg: #f5f6f3;
  --surface: #ffffff;
  --surface-2: #f0f3ef;
  --ink: #202124;
  --muted: #626a6f;
  --line: #d7ddd6;
  --line-strong: #b8c3bc;
  --accent: #0f766e;
  --accent-strong: #115e59;
  --accent-soft: #d9f0ec;
  --warning: #b54708;
  --warning-soft: #fff2d6;
  --danger: #b42318;
  --danger-soft: #fee4e2;
  --success: #167647;
  --success-soft: #dcfae6;
  --gold: #a15c07;
  --gold-soft: #f8ead4;
  --shadow: 0 8px 28px rgba(32, 33, 36, 0.08);
  --radius: 8px;
  --font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font);
  font-size: 15px;
  letter-spacing: 0;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
}

.icon-sprite,
.visually-hidden {
  position: absolute;
  width: 1px;
  height: 1px;
  overflow: hidden;
  clip: rect(0 0 0 0);
  white-space: nowrap;
}

.app-shell {
  min-height: 100vh;
}

.layout {
  display: grid;
  grid-template-columns: 292px minmax(0, 1fr);
  min-height: 100vh;
}

.sidebar {
  position: sticky;
  top: 0;
  height: 100vh;
  overflow: auto;
  border-right: 1px solid var(--line);
  background: #fbfcfa;
  padding: 20px 16px 16px;
}

.brand {
  display: grid;
  grid-template-columns: 44px minmax(0, 1fr);
  gap: 12px;
  align-items: center;
  margin-bottom: 18px;
}

.brand-mark {
  display: grid;
  place-items: center;
  width: 44px;
  height: 44px;
  border: 1px solid var(--line-strong);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--accent);
}

.brand h1 {
  margin: 0 0 4px;
  font-size: 17px;
  line-height: 1.25;
}

.brand p {
  margin: 0;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.5;
}

.module-nav {
  display: grid;
  gap: 6px;
}

.nav-button {
  display: grid;
  grid-template-columns: 26px minmax(0, 1fr) auto;
  gap: 8px;
  align-items: center;
  width: 100%;
  min-height: 42px;
  border: 1px solid transparent;
  border-radius: var(--radius);
  background: transparent;
  color: var(--ink);
  padding: 8px 10px;
  text-align: left;
}

.nav-button:hover {
  background: var(--surface-2);
}

.nav-button.active {
  border-color: var(--accent);
  background: var(--accent-soft);
}

.nav-index {
  display: grid;
  place-items: center;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: var(--surface);
  color: var(--muted);
  font-size: 12px;
  border: 1px solid var(--line);
}

.nav-button.active .nav-index {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.nav-copy {
  min-width: 0;
}

.nav-title {
  display: block;
  font-weight: 700;
  line-height: 1.35;
}

.nav-desc {
  display: block;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.4;
  margin-top: 1px;
}

.nav-status {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #c7d0ca;
}

.nav-status.done {
  background: var(--success);
}

.sidebar-note {
  margin-top: 18px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--muted);
  font-size: 12px;
  line-height: 1.55;
}

.main {
  min-width: 0;
  padding: 24px clamp(18px, 3vw, 40px) 40px;
}

.topbar {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 18px;
}

.eyebrow {
  margin: 0 0 6px;
  color: var(--accent-strong);
  font-weight: 700;
  font-size: 13px;
}

.page-title {
  margin: 0;
  font-size: clamp(24px, 3vw, 34px);
  line-height: 1.18;
}

.page-subtitle {
  max-width: 880px;
  margin: 8px 0 0;
  color: var(--muted);
  line-height: 1.65;
}

.toolbar {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 8px;
  min-width: 300px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  min-height: 36px;
  border: 1px solid var(--line-strong);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--ink);
  padding: 8px 11px;
  text-decoration: none;
  line-height: 1.2;
}

.btn:hover {
  border-color: var(--accent);
  color: var(--accent-strong);
}

.btn.primary {
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;
}

.btn.primary:hover {
  background: var(--accent-strong);
  color: #fff;
}

.btn.danger {
  border-color: #f0aaa4;
  color: var(--danger);
}

.btn.icon-only {
  width: 36px;
  padding: 0;
}

.icon {
  width: 17px;
  height: 17px;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex: 0 0 auto;
}

.notice {
  display: grid;
  grid-template-columns: 28px minmax(0, 1fr) auto;
  gap: 12px;
  align-items: start;
  margin: 0 0 16px;
  padding: 14px;
  border: 1px solid #f4c790;
  border-radius: var(--radius);
  background: var(--warning-soft);
}

.notice h2 {
  margin: 0 0 4px;
  font-size: 16px;
}

.notice p {
  margin: 0;
  color: #6f3f0a;
  line-height: 1.55;
}

.workspace {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 320px;
  gap: 18px;
  align-items: start;
}

.section-stack {
  display: grid;
  gap: 16px;
}

.panel {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
  box-shadow: var(--shadow);
}

.panel-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 14px;
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--line);
}

.panel-header h2,
.panel-header h3 {
  margin: 0;
  font-size: 17px;
  line-height: 1.35;
}

.panel-header p {
  margin: 5px 0 0;
  color: var(--muted);
  line-height: 1.55;
  font-size: 13px;
}

.panel-body {
  padding: 18px;
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
}

.form-grid.single {
  grid-template-columns: minmax(0, 1fr);
}

.field {
  display: grid;
  gap: 7px;
}

.field.full {
  grid-column: 1 / -1;
}

.field label {
  font-weight: 700;
  line-height: 1.35;
}

.field .hint {
  margin: 0;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.5;
}

.field input,
.field select,
.field textarea {
  width: 100%;
  min-height: 38px;
  border: 1px solid var(--line-strong);
  border-radius: var(--radius);
  background: #fff;
  color: var(--ink);
  padding: 8px 10px;
}

.field textarea {
  min-height: 86px;
  resize: vertical;
  line-height: 1.55;
}

.field input:focus,
.field select:focus,
.field textarea:focus {
  outline: 3px solid rgba(15, 118, 110, 0.18);
  border-color: var(--accent);
}

.table-wrap {
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: var(--radius);
}

.data-table {
  width: 100%;
  min-width: 880px;
  border-collapse: collapse;
  background: #fff;
}

.data-table th,
.data-table td {
  border-bottom: 1px solid var(--line);
  padding: 8px;
  text-align: left;
  vertical-align: top;
}

.data-table th {
  position: sticky;
  top: 0;
  z-index: 1;
  background: #edf4f2;
  font-size: 12px;
  line-height: 1.35;
}

.data-table td {
  min-width: 120px;
}

.data-table td.compact,
.data-table th.compact {
  min-width: 54px;
  width: 54px;
}

.data-table td.wide {
  min-width: 210px;
}

.data-table input,
.data-table select {
  width: 100%;
  min-height: 34px;
  border: 1px solid var(--line-strong);
  border-radius: 6px;
  padding: 6px 8px;
}

.computed {
  display: block;
  min-height: 34px;
  border-radius: 6px;
  background: var(--success-soft);
  color: #075d37;
  padding: 7px 8px;
  line-height: 1.45;
}

.computed.warn {
  background: var(--warning-soft);
  color: #7a4304;
}

.computed.danger {
  background: var(--danger-soft);
  color: var(--danger);
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
}

.metric {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fff;
  padding: 13px;
}

.metric b {
  display: block;
  margin-bottom: 6px;
  color: var(--muted);
  font-size: 12px;
}

.metric strong {
  display: block;
  font-size: 19px;
  line-height: 1.25;
}

.metric p {
  margin: 6px 0 0;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
}

.result-list {
  display: grid;
  gap: 10px;
}

.result-item {
  border-left: 4px solid var(--accent);
  background: #fff;
  padding: 12px 13px;
}

.result-item.high {
  border-left-color: var(--danger);
}

.result-item.medium {
  border-left-color: var(--warning);
}

.result-item.low {
  border-left-color: var(--success);
}

.result-item h3 {
  margin: 0 0 6px;
  font-size: 15px;
}

.result-item p {
  margin: 0;
  color: var(--muted);
  line-height: 1.55;
}

.side-rail {
  display: grid;
  gap: 16px;
  position: sticky;
  top: 20px;
}

.preview-image {
  display: block;
  width: 100%;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fff;
}

.rail-list {
  display: grid;
  gap: 10px;
  margin: 0;
  padding: 0;
  list-style: none;
}

.rail-list li {
  display: grid;
  gap: 3px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--line);
}

.rail-list li:last-child {
  padding-bottom: 0;
  border-bottom: 0;
}

.rail-list b {
  font-size: 13px;
}

.rail-list span {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.5;
}

.report {
  display: grid;
  gap: 13px;
}

.report-row {
  display: grid;
  grid-template-columns: 160px minmax(0, 1fr) 78px;
  gap: 12px;
  align-items: start;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fff;
}

.report-row h3 {
  margin: 0;
  font-size: 15px;
}

.report-row p {
  margin: 0;
  line-height: 1.58;
  color: var(--muted);
}

.priority {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 26px;
  border-radius: 999px;
  padding: 3px 10px;
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
}

.priority.high {
  background: var(--danger-soft);
  color: var(--danger);
}

.priority.medium {
  background: var(--warning-soft);
  color: var(--warning);
}

.priority.low {
  background: var(--success-soft);
  color: var(--success);
}

.rules-list {
  display: grid;
  gap: 10px;
}

.rule-item {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fff;
  padding: 13px;
}

.rule-item h3 {
  margin: 0 0 6px;
  font-size: 15px;
}

.rule-item p {
  margin: 0 0 8px;
  color: var(--muted);
  line-height: 1.55;
}

.tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.tag {
  display: inline-flex;
  align-items: center;
  min-height: 24px;
  border-radius: 999px;
  background: var(--surface-2);
  color: #4b5357;
  padding: 3px 8px;
  font-size: 12px;
}

.toast {
  position: fixed;
  right: 18px;
  bottom: 18px;
  z-index: 20;
  max-width: min(420px, calc(100vw - 36px));
  border: 1px solid var(--line-strong);
  border-radius: var(--radius);
  background: var(--surface);
  box-shadow: var(--shadow);
  padding: 11px 13px;
  color: var(--ink);
  line-height: 1.45;
}

.empty {
  border: 1px dashed var(--line-strong);
  border-radius: var(--radius);
  background: #fff;
  padding: 20px;
  color: var(--muted);
  line-height: 1.55;
}

@media (max-width: 1120px) {
  .layout {
    grid-template-columns: 240px minmax(0, 1fr);
  }

  .workspace {
    grid-template-columns: minmax(0, 1fr);
  }

  .side-rail {
    position: static;
  }
}

@media (max-width: 820px) {
  .layout {
    display: block;
  }

  .sidebar {
    position: static;
    height: auto;
    border-right: 0;
    border-bottom: 1px solid var(--line);
  }

  .module-nav {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .topbar {
    display: grid;
  }

  .toolbar {
    justify-content: flex-start;
    min-width: 0;
  }

  .form-grid,
  .summary-grid {
    grid-template-columns: minmax(0, 1fr);
  }

  .notice {
    grid-template-columns: 24px minmax(0, 1fr);
  }

  .notice .btn {
    grid-column: 1 / -1;
    width: fit-content;
  }

  .report-row {
    grid-template-columns: minmax(0, 1fr);
  }
}

@media (max-width: 520px) {
  .main {
    padding: 18px 12px 28px;
  }

  .sidebar {
    padding: 16px 12px;
  }

  .module-nav {
    grid-template-columns: minmax(0, 1fr);
  }

  .panel-header,
  .panel-body {
    padding-left: 12px;
    padding-right: 12px;
  }
}

@media print {
  body {
    background: #fff;
  }

  .sidebar,
  .toolbar,
  .notice,
  .side-rail,
  .panel:not(.printable) {
    display: none !important;
  }

  .layout {
    display: block;
  }

  .main {
    padding: 0;
  }

  .panel,
  .report-row {
    box-shadow: none;
    break-inside: avoid;
  }
}

    </style>

  const baseFields = [

  function mergeDefaults(base, saved) {
    if (Array.isArray(base)) return Array.isArray(saved) ? saved : base;
    if (base && typeof base === "object") {
      const out = { ...base };
      if (saved && typeof saved === "object") {
        for (const key of Object.keys(saved)) {
          out[key] = key in base ? mergeDefaults(base[key], saved[key]) : saved[key];
        }
      }
      return out;
    }
    return saved === undefined ? base : saved;
  }

  function renderModule(id, results) {

    return `
      <div class="field${full}">
        <label for="${fieldId(field.path)}">${escapeHtml(field.label)}</label>
        ${renderInput(field, value)}
        ${field.hint ? `<p class="hint">${escapeHtml(field.hint)}</p>` : ""}
      </div>
    `;
  }

  function renderMiniInput(field) {
    const value = getByPath(state, field.path) ?? "";
    return renderInput(field, value, true);
  }

  function renderInput(field, value) {
    const id = fieldId(field.path);
    if (field.type === "select") {
      return `
        <select id="${id}" data-path="${escapeAttr(field.path)}">
          ${(field.options || []).map((option) => `<option value="${escapeAttr(option)}" ${option === value ? "selected" : ""}>${escapeHtml(option || "请选择")}</option>`).join("")}
        </select>
      `;
    }
    if (field.type === "textarea") {
      return `<textarea id="${id}" data-path="${escapeAttr(field.path)}">${escapeHtml(value)}</textarea>`;
    }
    return `<input id="${id}" data-path="${escapeAttr(field.path)}" type="${field.type || "text"}" value="${escapeAttr(value)}" ${field.type === "number" ? 'inputmode="decimal" step="any"' : ""} />`;
  }

  function renderTableInput(path, value, field) {
    const normalizedValue = value ?? "";
    if (field.type === "select") {
      return `
        <select data-path="${escapeAttr(path)}">
          ${(field.options || []).map((option) => `<option value="${escapeAttr(option)}" ${option === normalizedValue ? "selected" : ""}>${escapeHtml(option || "请选择")}</option>`).join("")}
        </select>
      `;
    }
    return `<input data-path="${escapeAttr(path)}" type="${field.type || "text"}" value="${escapeAttr(normalizedValue)}" ${field.type === "number" ? 'inputmode="decimal" step="any"' : ""} />`;
  }

  function calculateAll(current) {
    const divorce = calculateDivorce(current);
    const children = calculateChildren(current);
    const property = calculateProperty(current);
    const debt = calculateDebt(current);
    const bridePrice = calculateBridePrice(current);
    const relief = calculateRelief(current);
    const reportRows = buildReportRows(current, { divorce, children, property, debt, bridePrice, relief });
    const overallPriority = reportRows.some((row) => row.priority === "高") ? "高" : reportRows.some((row) => row.priority === "中") ? "中" : "低";
    return { divorce, children, property, debt, bridePrice, relief, reportRows, overallPriority };
  }

  function calculateDivorce(current) {
    const d = current.divorce;
    const strongKeys = ["bigamyCohabitation", "domesticViolence", "abuseAbandon", "badHabits", "declaredMissing"];
    const strongScore = strongKeys.reduce((sum, key) => sum + (d[key] === "是" ? 5 : 0), 0) + (current.base.separatedAfterNoJudgment === "是" ? 5 : 0);
    const cautiousScore = (d.separatedTwoYears === "是" ? 3 : 0) + (d.otherBroken === "是" ? 2 : 0);
    const matchedCount = Object.values(d).filter((item) => item === "是").length + (current.base.separatedAfterNoJudgment === "是" ? 1 : 0);

    let litigationSupport = "较低：暂未匹配明确法定离婚情形";
    if (current.base.registeredStatus === "未办理结婚登记") {
      litigationSupport = "不适用离婚路径，建议查看同居、子女、彩礼、析产规则";
    } else if (current.base.separatedAfterNoJudgment === "是") {
      litigationSupport = "较高：已填报判决不准离婚后又分居满一年，再次起诉属于明确准予离婚情形";
    } else if (d.declaredMissing === "是") {
      litigationSupport = "较高：已填报一方被宣告失踪，属于强客观法定情形";
    } else if (["bigamyCohabitation", "domesticViolence", "abuseAbandon", "badHabits"].some((key) => d[key] === "是")) {
      litigationSupport = "中高至较高：已匹配重婚/同居、家暴、虐待遗弃、恶习屡教不改等明显法定情形";
    } else if (d.separatedTwoYears === "是") {
      litigationSupport = current.base.firstSuit === "是"
        ? "中等偏高但需审慎：首次起诉即使填报因感情不和分居满二年，仍不宜直接判断为高支持"
        : "中高：已填报因感情不和分居满二年，仍需综合婚姻基础、关系现状和和好可能判断";
    } else if (d.otherBroken === "是") {
      litigationSupport = current.base.firstSuit === "是"
        ? "谨慎：首次起诉且主要依赖其他感情破裂事实，司法判断通常较保守"
        : "中等：存在其他感情破裂因素，但仍属综合裁量";
    } else if (d.agreementOnAll === "是") {
      litigationSupport = "偏低至中等：协议条件有利于调解，但不等于法院当然判离";
    }

    const agreementPath = current.base.bothAgree === "是" && current.base.divorceAgreement === "是" && current.base.coolingPeriod === "是"
      ? "协议离婚路径较清晰"
      : "协议离婚条件尚不完整或待确认";
    const procedureRisk = current.base.maleSuitLimit === "是"
      ? "存在特殊起诉限制或程序限制，建议先咨询律师"
      : current.base.militaryMarriage === "是"
        ? "涉及军婚特别规则，建议律师复核"
        : "未识别明显特殊程序限制";
    const firstSuitTip = current.base.firstSuit === "是" && strongScore === 0
      ? "首次起诉且未填报重婚同居、家暴、虐待遗弃、恶习屡教不改、失踪、判不离后再分居等强情形时，结论应保守表达为谨慎或中等，不宜提示高概率。"
      : "未触发首次起诉保守降档，但仍应避免承诺法院必然判离。";
    const priority = litigationSupport.includes("较高") || litigationSupport.includes("家暴") || procedureRisk.includes("特殊") ? "高" : litigationSupport.includes("中") || litigationSupport.includes("谨慎") ? "中" : "低";
    return { strongScore, cautiousScore, matchedCount, litigationSupport, agreementPath, procedureRisk, firstSuitTip, priority };
  }

  function calculateChildren(current) {
    const count = toNumber(current.children.count);
    const rows = current.children.rows.map((row) => {
      const hasAny = Object.values(row).some((value) => value !== "" && value !== "否" && value !== "不确定" && value !== "未表达/不适用");
      const age = toNumber(row.age);
      if (!hasAny && row.age === "") return { tendency: "", fee: "", tip: "" };
      let tendency = "综合最有利于未成年人原则判断";
      if (Number.isFinite(age)) {
        if (age < 2) tendency = "原则上更倾向母方直接抚养（非绝对）";
        else if (age >= 8) {
          if (row.wish === "愿随父亲") tendency = "倾向尊重子女愿随父亲的真实意愿";
          else if (row.wish === "愿随母亲") tendency = "倾向尊重子女愿随母亲的真实意愿";
          else tendency = "应重点核实并尊重子女真实意愿";
        } else if (row.fatherBad === "是") tendency = "倾向母方或其他更适宜照护方";
        else if (row.motherBad === "是") tendency = "倾向父方或其他更适宜照护方";
        else if (row.care !== "不确定") tendency = "倾向维持当前稳定照护状态";
      }
      const fee = count <= 1
        ? "一般可参考不直接抚养方月收入20%-30%，无固定收入则参考实际负担能力"
        : "两个以上子女一般可适当提高，但通常不宜超过月收入50%";
      const tip = Number.isFinite(age)
        ? age < 2 ? "两周岁以下规则较特殊" : age >= 8 ? "八周岁以上应尊重其真实意愿" : "两至八周岁重点比较双方照护能力和稳定生活环境"
        : "请先填写年龄";
      return { tendency, fee, tip };
    });
    return { rows };
  }

  function calculateProperty(current) {
    let total = 0;
    let highCount = 0;
    let personalCount = 0;
    const rows = current.property.rows.map((row) => {
      const hasAny = row.name || row.type || row.value;
      if (!hasAny) return { ownership: "", amount: "", amountText: "" };
      let ownership = "高争议/待确认";
      if (row.agreement === "是") ownership = "按夫妻财产约定优先判断";
      else if (row.exclusiveGift === "是") ownership = "倾向一方个人财产";
      else if (row.acquireTime === "婚前取得") ownership = "倾向个人财产，婚后还贷及增值另行判断";
      else if (row.acquireTime === "婚后取得") ownership = row.parentFunded === "是" ? "高争议：父母出资购房需专项判断" : "倾向夫妻共同财产";

      const value = toNumber(row.value);
      let amount = "";
      let amountText = "";
      if (Number.isFinite(value)) {
        if (ownership === "倾向夫妻共同财产") {
          amount = value;
          amountText = formatMoney(value);
          total += value;
        } else if (ownership === "按夫妻财产约定优先判断") {
          amountText = "按约定另计";
        } else if (ownership.startsWith("高争议")) {
          amountText = "暂不自动计入";
        } else {
          amount = 0;
          amountText = "0";
        }
      }
      if (ownership.startsWith("高争议")) highCount += 1;
      if (ownership.startsWith("倾向个人财产") || ownership === "倾向一方个人财产") personalCount += 1;
      return { ownership, amount, amountText };
    });
    return { rows, total, highCount, personalCount };
  }

  function calculateDebt(current) {
    let total = 0;
    let highCount = 0;
    let personalCount = 0;
    const rows = current.debt.rows.map((row) => {
      const hasAny = row.name || row.amount;
      if (!hasAny) return { result: "", amount: "", amountText: "" };
      let result = "高争议/待确认";
      if (row.illegal === "是") result = "倾向个人债务或不受保护债务";
      else if (row.signed === "是") result = "倾向夫妻共同债务";
      else if (["家庭日常生活", "夫妻共同经营", "购置共同财产"].includes(row.use)) result = "倾向夫妻共同债务";
      else if (row.exceedsDaily === "是") result = "高争议：需证明共同意思或共同利益";

      const value = toNumber(row.amount);
      let amount = "";
      let amountText = "";
      if (Number.isFinite(value)) {
        if (result === "倾向夫妻共同债务") {
          amount = value;
          amountText = formatMoney(value);
          total += value;
        } else if (result.startsWith("高争议")) {
          amountText = "暂不自动计入";
        } else {
          amount = 0;
          amountText = "0";
        }
      }
      if (result.startsWith("高争议")) highCount += 1;
      if (result === "倾向个人债务或不受保护债务") personalCount += 1;
      return { result, amount, amountText };
    });
    return { rows, total, highCount, personalCount };
  }

  function calculateBridePrice(current) {
    const b = current.bridePrice;
    let support = "不适用";
    if (b.exists === "是") {
      if (b.registered === "否") support = "较高";
      else if (b.registered === "是" && b.livedTogether === "否") support = "较高";
      else if (b.registered === "是" && b.livedTogether === "是" && (!b.months || toNumber(b.months) <= 6)) support = "中高：可能部分返还";
      else if (b.pregnant === "是") support = "偏低至中等";
      else support = "中等至偏低";
    }
    const direction = b.exists !== "是"
      ? "不适用"
      : support === "较高"
        ? "返还比例可能较高"
        : support.startsWith("中高")
          ? "通常考虑部分返还"
          : support.startsWith("偏低")
            ? "返还比例可能较低"
            : "需综合共同生活、孕育、用途、过错判断";
    const conclusion = b.exists !== "是" ? "未填写彩礼或无彩礼，不进入返还判断" : `${support}；${direction}`;
    const priority = b.exists === "是" && (support.includes("较高") || toNumber(b.amount) >= 100000) ? "中" : "低";
    return { support, direction, conclusion, priority };
  }

  function calculateRelief(current) {
    const items = {};
    let matched = 0;
    for (const field of reliefFields) {
      const value = getByPath(current, field.path);
      if (value === "是") {
        items[field.path] = `已匹配：${field.consequence}`;
        matched += 1;
      } else if (value === "否") {
        items[field.path] = "暂不匹配";
      } else {
        items[field.path] = "待确认";
      }
    }
    const summary = Object.values(items).join("；");
    return { items, summary, priority: matched > 0 ? "高" : "中" };
  }

  function buildReportRows(current, results) {
    return [
      {
        module: "婚姻关系路径",
        conclusion: current.base.registeredStatus === "未办理结婚登记" ? "未登记：优先考虑同居、子女、彩礼和析产问题" : "已登记或待确认：进入离婚及婚姻效力判断",
        copy: "先判断是否已登记，再区分协议离婚、诉讼离婚、婚姻无效/撤销或同居关系。",
        priority: current.base.registeredStatus === "未办理结婚登记" || current.base.registeredStatus === "不确定" ? "中" : "低",
      },
      {
        module: "协议离婚路径",
        conclusion: results.divorce.agreementPath,
        copy: "双方自愿并对子女、财产、债务达成一致时，协议路径更清晰；协议内容仍需审查。",
        priority: results.divorce.agreementPath.includes("尚不完整") ? "中" : "低",
      },
      {
        module: "诉讼离婚支持度",
        conclusion: results.divorce.litigationSupport,
        copy: "按法定离婚情形进行事实匹配，并按首次起诉、再次起诉、判不离后又分居满一年等程序事实修正。",
        priority: results.divorce.priority,
      },
      {
        module: "子女抚养",
        conclusion: current.children.count ? `${current.children.count}名子女；请查看子女逐项初判` : "未填写子女信息",
        copy: "按年龄、照护稳定性、真实意愿、不利因素进行初判；最有利于未成年人原则具有裁量空间。",
        priority: current.children.count ? "高" : "低",
      },
      {
        module: "夫妻共同财产",
        conclusion: `倾向共同财产合计：${formatMoney(results.property.total)}；${results.property.highCount} 项高争议财产需专项判断`,
        copy: "婚后取得通常倾向共同财产，婚前财产、继承赠与、父母出资购房、股权等需细分。",
        priority: results.property.highCount > 0 ? "高" : "中",
      },
      {
        module: "夫妻共同债务",
        conclusion: `倾向共同债务合计：${formatMoney(results.debt.total)}；${results.debt.highCount} 项高争议债务需专项判断`,
        copy: "共同签字、追认、家庭共同生活或共同经营用途更可能认定为共同债务。",
        priority: results.debt.highCount > 0 ? "高" : "中",
      },
      {
        module: "彩礼返还",
        conclusion: results.bridePrice.conclusion,
        copy: "按是否登记、共同生活、共同生活时长、孕育、用途、生活困难等因素判断。",
        priority: results.bridePrice.priority,
      },
      {
        module: "补偿赔偿少分",
        conclusion: results.relief.summary,
        copy: "匹配家务补偿、经济帮助、损害赔偿、少分不分等特别规则。",
        priority: results.relief.priority,
      },
      {
        module: "综合风险说明",
        conclusion: "本报告仅供参考，不构成正式法律意见。",
        copy: "不得替代律师咨询、证据审查、诉讼策略和法院裁判。不得仅凭本报告起诉、签约、转移财产或拒绝履行义务。",
        priority: "高",
      },
      {
        module: "律师引流建议",
        conclusion: "建议设置“生成报告后预约律师复核”入口。",
        copy: "免费工具解决认知问题，律师服务解决个案判断和行动方案。避免对外承诺胜诉率、判离率或返还比例。",
        priority: "高",
      },
    ];
  }

  function reportToText() {
    const results = calculateAll(state);
    const lines = ["婚姻家事权益初判报告", "", "重要声明：本报告仅供参考，不构成正式法律意见，不能替代律师个案分析、证据审查、诉讼策略判断或法院裁判。", ""];
    for (const row of results.reportRows) {
      lines.push(`【${row.module}】`);
      lines.push(`结论：${row.conclusion}`);
      lines.push(`说明：${row.copy}`);
      lines.push(`律师复核优先级：${row.priority}`);
      lines.push("");
    }
    return lines.join("\n");
  }

  async function copyReport() {
    const text = reportToText();
    try {
      await navigator.clipboard.writeText(text);
      toast("报告已复制到剪贴板。");
    } catch {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      textarea.remove();
      toast("报告已复制到剪贴板。");
    }
  }

  function downloadTextReport() {
    downloadBlob(reportToText(), "婚姻家事权益初判报告.txt", "text/plain;charset=utf-8");
  }

  function downloadJson() {
    downloadBlob(JSON.stringify(state, null, 2), "婚姻家事权益初判数据.json", "application/json;charset=utf-8");
  }

  function bindImport() {
    const input = document.getElementById("importFile");
    input.addEventListener("change", async () => {
      const file = input.files && input.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        state = mergeDefaults(defaultState(), JSON.parse(text));
        saveState();
        renderApp();
        toast("已导入 JSON 数据。");
      } catch (error) {
        console.error(error);
        toast("导入失败，请确认文件是本工具导出的 JSON。");
      } finally {
        input.value = "";
      }
    });
  }

  function downloadBlob(content, filename, type) {
    const blob = new Blob([content], { type });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = filename;
    link.click();
    URL.revokeObjectURL(url);
  }

  function addRow(scope) {
    if (scope === "children") state.children.rows.push(makeChildRow());
    if (scope === "property") state.property.rows.push(makePropertyRow());
    if (scope === "debt") state.debt.rows.push(makeDebtRow());
  }

  function removeRow(scope, index) {
    if (scope === "children" && state.children.rows.length > 1) state.children.rows.splice(index, 1);
    if (scope === "property" && state.property.rows.length > 1) state.property.rows.splice(index, 1);
    if (scope === "debt" && state.debt.rows.length > 1) state.debt.rows.splice(index, 1);
  }

  function isModuleStarted(id) {
    if (id === "guide") return state.accepted;
    if (id === "report" || id === "rules") return true;
    const baseline = defaultState();
    return JSON.stringify(state[id]) !== JSON.stringify(baseline[id]);
  }

  function metric(label, value, help) {
    return `<div class="metric"><b>${escapeHtml(label)}</b><strong>${escapeHtml(value)}</strong><p>${escapeHtml(help)}</p></div>`;
  }

  function renderResultItem(title, text, tone) {
    return `<article class="result-item ${tone || ""}"><h3>${escapeHtml(title)}</h3><p>${escapeHtml(text)}</p></article>`;
  }

  function resultTone(text) {
    if (!text) return "";
    if (text.includes("高争议") || text.includes("个人债务")) return "warn";
    if (text.includes("共同")) return "";
    return "danger";
  }

  function priorityClass(priority) {
    if (priority === "高" || priority === "high") return "high";
    if (priority === "中" || priority === "medium") return "medium";
    return "low";
  }

  function icon(name) {
    return `<svg class="icon" aria-hidden="true"><use href="#icon-${name}"></use></svg>`;
  }

  function fieldId(path) {
    return `field-${path.replace(/[^a-zA-Z0-9_-]/g, "-")}`;
  }

  function getByPath(obj, path) {
    return path.split(".").reduce((current, key) => current == null ? undefined : current[key], obj);
  }

  function setByPath(obj, path, value) {
    const parts = path.split(".");
    let current = obj;
    for (let i = 0; i < parts.length - 1; i += 1) current = current[parts[i]];
    current[parts[parts.length - 1]] = value;
  }

  function toNumber(value) {
    if (value === "" || value == null) return NaN;
    const normalized = String(value).replace(/,/g, "").trim();
    if (!normalized) return NaN;
    const number = Number(normalized);
    return Number.isFinite(number) ? number : NaN;
  }

  function formatMoney(value) {
    const number = Number(value);
    if (!Number.isFinite(number)) return "0.00";
    return number.toLocaleString("zh-CN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function escapeAttr(value) {
    return escapeHtml(value);
  }

  let toastTimer = null;
  function toast(message) {
    const existing = document.querySelector(".toast");
    if (existing) existing.remove();
    const el = document.createElement("div");
    el.className = "toast";
    el.textContent = message;
    document.body.appendChild(el);
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.remove(), 2600);
  }
